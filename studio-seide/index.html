<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STUDIO SEIDE — Haus für Haar & Beauty</title>
    <meta
      name="description"
      content="STUDIO SEIDE ist ein Haus für Haar & Beauty: Schnitt als Handwerk, Farbe als Charakter. Editorial, ehrlich, persönlich — mitten in der Stadt."
    />
    <meta name="theme-color" content="#17120d" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="STUDIO SEIDE — Haus für Haar & Beauty" />
    <meta
      property="og:description"
      content="Schnitt als Handwerk, Farbe als Charakter. Dein Termin im STUDIO SEIDE."
    />
    <meta property="og:image" content="./og-image.svg" />

    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />

    <!--
      Fonts are a progressive enhancement only.
      preconnect + the stylesheet below speed up loading the editorial pairing
      (Fraunces display serif + Inter). If Google Fonts is blocked/offline the
      page still renders perfectly via the system fallbacks defined in CSS
      (--font-display / --font-sans). No font = no problem.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
